name: "Setup Node.js and pnpm"
description: "Sets up Node.js and pnpm with caching"

runs:
  using: "composite"
  steps:
    - name: Install pnpm
      uses: pnpm/action-setup@v4
      with:
        version: 11.5.0
    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: 25
        cache: "pnpm"
    - name: Debug pnpm config
      shell: bash
      run: |
        echo "pnpm version:"
        pnpm --version
        echo "---"
        echo "pnpm-workspace.yaml:"
        cat pnpm-workspace.yaml || echo "(missing)"
        echo "---"
        echo "onlyBuiltDependencies:"
        pnpm config get onlyBuiltDependencies
    - name: Install dependencies
      shell: bash
      run: pnpm install
